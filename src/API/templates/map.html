<!DOCTYPE html>
<html>
<head>
    <title>Risk Atlas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/@supabase/supabase-js"></script>
</head>
<body>

<div class="container">

    <!-- ===== TITLE ===== -->
    <div class="title-bar">
        🌍 Risk Atlas
    </div>

    <!-- ===== NAV + LOGIN ===== -->
    <div class="nav-bar">

        <div class="nav-left">
            <a href="/?tab=maps" class="{% if selected_tab == 'maps' %}active{% endif %}">🗺️ Maps</a>
            <a href="/?tab=implementation" class="{% if selected_tab == 'implementation' %}active{% endif %}">⚙️ Implementation</a>
            <a href="/?tab=emergency" class="{% if selected_tab == 'emergency' %}active{% endif %}">🚨 Emergency</a>
        </div>

        <div class="nav-right">
            <input id="email" placeholder="Email">
            <input id="password" type="password" placeholder="Password">
            <button onclick="login()">Login</button>
            <button onclick="logout()">Logout</button>
        </div>

    </div>

    <!-- ===== MAIN ===== -->
    <div class="main">

        <div class="map">
            <iframe id="mapFrame"></iframe>
        </div>

        <div class="sidebar">

            <div class="box">
                <h3>Score</h3>

                <form method="get">
                    <input type="hidden" name="tab" value="maps">

                    <select name="score">
                        {% for col in scores %}
                        <option value="{{ col }}" {% if col == selected_score %}selected{% endif %}>
                            {{ col }}
                        </option>
                        {% endfor %}
                    </select>

                    <label class="checkbox-label">
                        <input type="checkbox" name="only_impl" value="true"
                               {% if only_impl %}checked{% endif %}>
                        Only our implementations
                    </label>

                    <button type="submit">Update</button>
                </form>
            </div>

            <div class="box">
                <h3>Color Scale</h3>

                <form method="get">
                    <input type="hidden" name="tab" value="maps">

                    <select name="colormap">
                        <option value="Blues">Blues</option>
                        <option value="Greens">Greens</option>
                        <option value="Reds">Reds</option>
                        <option value="Viridis">Viridis</option>
                    </select>

                    <button type="submit">Apply</button>
                </form>
            </div>

        </div>

    </div>

</div>

<script>
const supabaseClient = supabase.createClient(
    "https://xccdxewtvkscnudynbsx.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjY2R4ZXd0dmtzY251ZHluYnN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NzMxMjAsImV4cCI6MjA5MjI0OTEyMH0.LuVVtBh413nXknaO-NXtBpZT-V61XQbkfvHtr3BOiwE"
);

async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
    });

    console.log("DATA:", data);
    console.log("ERROR:", error);

    if (error) {
        alert(error.message);
        return;
    }

    localStorage.setItem("token", data.session.access_token);
    alert("Login success");
    loadMap();
}

async function logout() {
    await supabaseClient.auth.signOut();
    localStorage.removeItem("token");
    loadMap();
}

function loadMap() {
    const token = localStorage.getItem("token") || "";
    document.getElementById("mapFrame").src =
        "/map_html?token=" + encodeURIComponent(token);
}

window.onload = () => {
    const token = localStorage.getItem("token");

    if (!token) {
        alert("Please login first");
        return;
    }

    loadMap();
};
</script>

</body>
</html>
