<!DOCTYPE html>
<html>

<head>

    <title>Set Password - Risk Atlas</title>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <script src="https://unpkg.com/@supabase/supabase-js"></script>

    <style>

        * {
            box-sizing: border-box;
        }

        body {

            margin: 0;

            font-family:
                Inter,
                Arial,
                sans-serif;

            background:
                linear-gradient(
                    135deg,
                    #0f172a,
                    #1e293b
                );

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;
        }

        .card {

            width: 420px;

            background: white;

            padding: 40px;

            border-radius: 20px;

            box-shadow:
                0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {

            margin-top: 0;

            margin-bottom: 10px;

            font-size: 28px;

            color: #0f172a;
        }

        p {

            color: #64748b;

            margin-bottom: 30px;

            line-height: 1.5;
        }

        input {

            width: 100%;

            padding: 14px;

            margin-bottom: 20px;

            border-radius: 10px;

            border: 1px solid #cbd5e1;

            font-size: 15px;
        }

        input:focus {

            outline: none;

            border-color: #2563eb;

            box-shadow:
                0 0 0 3px rgba(
                    37,
                    99,
                    235,
                    0.15
                );
        }

        button {

            width: 100%;

            padding: 14px;

            border: none;

            border-radius: 10px;

            background: #2563eb;

            color: white;

            font-size: 16px;

            font-weight: 600;

            cursor: pointer;

            transition: 0.2s;
        }

        button:hover {

            background: #1d4ed8;
        }

        #message {

            margin-top: 20px;

            text-align: center;

            font-size: 14px;
        }

    </style>

</head>

<body>

<div class="card">

    <h1>
        🔐 Set Your Password
    </h1>

    <p>
        Welcome to Risk Atlas.
        Please choose a secure password
        to activate your account.
    </p>

    <input
        type="password"
        id="password"
        placeholder="New password"
    >

    <button onclick="setPassword()">
        Save Password
    </button>

    <div id="message"></div>

</div>

<script>

const supabaseClient = supabase.createClient(
    "https://xccdxewtvkscnudynbsx.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjY2R4ZXd0dmtzY251ZHluYnN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NzMxMjAsImV4cCI6MjA5MjI0OTEyMH0.LuVVtBh413nXknaO-NXtBpZT-V61XQbkfvHtr3BOiwE"
);

/* ========================================================================= */
/* RESTORE SUPABASE SESSION */
/* ========================================================================= */

window.onload = async () => {

    const hash = window.location.hash;

    if (!hash) {
        return;
    }

    const params = new URLSearchParams(
        hash.substring(1)
    );

    const accessToken =
        params.get("access_token");

    const refreshToken =
        params.get("refresh_token");

    if (
        accessToken
        && refreshToken
    ) {

        await supabaseClient.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken,
        });
    }
};

async function setPassword() {

    const password =
        document.getElementById(
            "password"
        ).value;

    const message =
        document.getElementById(
            "message"
        );

    if (password.length < 6) {

        message.innerHTML =
            "❌ Password too short";

        message.style.color = "red";

        return;
    }

    const { error } =
        await supabaseClient.auth.updateUser({
            password: password
        });

    if (error) {

        message.innerHTML =
            "❌ " + error.message;

        message.style.color = "red";

        return;
    }

    message.innerHTML =
        "✅ Password updated successfully";

    message.style.color = "green";

    setTimeout(() => {

        window.location.href = "https://riskatlas.onrender.com/";

    }, 1500);
}

</script>

</body>

</html>
